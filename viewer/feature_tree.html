<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feature tree viewer</title>
  <link rel="stylesheet" href="vendor/vis-network.min.css" />
  <style>
    :root {
      --bg: #1a1d23;
      --panel: #22262e;
      --border: #343a46;
      --text: #e6e9ef;
      --muted: #8b93a7;
      --accent: #5b8cff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
    header .meta { font-size: 0.8rem; color: var(--muted); }
    header input[type="search"] { padding: 0.35rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); min-width: 12rem; }
    header select, header button { padding: 0.35rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; }
    main { flex: 1; display: flex; min-height: 0; }
    #left, #right {
      width: 260px; min-width: 200px; max-width: 320px; background: var(--panel); border-color: var(--border);
      border-style: solid; border-width: 0 1px; overflow: auto; padding: 0.75rem; font-size: 0.85rem;
    }
    #left { border-width: 0 1px 0 0; }
    #right { border-width: 0 0 0 1px; }
    #center { flex: 1; min-width: 0; position: relative; }
    #net { width: 100%; height: 100%; }
    #left h2, #right h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 0.5rem; }
    #left label { display: flex; align-items: center; gap: 0.4rem; margin: 0.25rem 0; cursor: pointer; }
    #toast {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: #333c4d; color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 20;
    }
    #toast.show { opacity: 1; }
    .anchor-list { margin: 0 0 0.75rem; padding: 0; list-style: none; font-size: 0.82rem; }
    .anchor-list li { padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .anchor-list code { color: var(--text); }
    pre.detail { white-space: pre-wrap; word-break: break-all; font-size: 0.78rem; margin: 0; color: var(--muted); }
    @media (max-width: 900px) {
      #left, #right { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Feature tree</h1>
    <span class="meta" id="counts"></span>
    <span class="meta" id="rulesVer"></span>
    <input type="search" id="search" placeholder="Search label / id…" />
    <label><input type="checkbox" id="onlyFs" /> 仅 feature + screen</label>
    <label><input type="checkbox" id="hideImpl" checked /> 隐藏 implementation</label>
    <label><input type="checkbox" id="focus1hop" /> 1-hop 聚焦选中</label>
    <select id="layoutSel">
      <option value="force">力导向</option>
      <option value="hier">层次</option>
    </select>
    <button type="button" id="resetView">重置视图</button>
  </header>
  <main>
    <aside id="left">
      <h2>节点 kind</h2>
      <div id="kindFilters"></div>
      <h2 style="margin-top:1rem">边 rel</h2>
      <div id="relFilters"></div>
    </aside>
    <section id="center"><div id="net"></div></section>
    <aside id="right">
      <h2>节点详情</h2>
      <p class="meta" id="pickHint">点击图中的节点</p>
      <pre class="detail" id="detail"></pre>
    </aside>
  </main>
  <div id="toast"></div>
  <script src="vendor/vis-network.min.js"></script>
  <script>
(function () {
  const VIEWER_TEMPLATE_VERSION = "1.0.0";
  const LARGE_THRESHOLD = 800;

  const KIND_SHAPES = {
    product_root: "box",
    feature: "box",
    screen: "ellipse",
    ui_surface: "box",
    ui_control: "diamond",
    behavior: "triangle",
    function_symbol: "dot",
    implementation: "dot",
  };

  const KIND_COLORS = {
    product_root: { bg: "#3d4f7a", border: "#7a8fc4" },
    feature: { bg: "#4a6b4a", border: "#8fc48f" },
    screen: { bg: "#5a4a7a", border: "#a48fc4" },
    ui_surface: { bg: "#4a6a7a", border: "#8fc4e4" },
    ui_control: { bg: "#7a6a4a", border: "#d4c48f" },
    behavior: { bg: "#7a4a5a", border: "#d48fa4" },
    function_symbol: { bg: "#4d5d66", border: "#9db7c4" },
    implementation: { bg: "#555", border: "#888" },
  };

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  function harmonyBorder(node) {
    const h = node.projection && node.projection.harmony;
    if (!h) return { width: 1, color: "#f5a623" };
    if (h.gap_ref) return { width: 3, color: "#f5a623" };
    return { width: 3, color: "#3ecf8e" };
  }

  function buildVisNodes(rawNodes, kindOn, relOn, onlyFs, hideImpl, searchQ) {
    const q = (searchQ || "").toLowerCase();
    return rawNodes.filter(function (n) {
      if (!kindOn[n.kind]) return false;
      if (onlyFs && n.kind !== "feature" && n.kind !== "screen" && n.kind !== "product_root") return false;
      if (hideImpl && (n.kind === "implementation" || n.kind === "ui_control")) return false;
      if (q && (String(n.label).toLowerCase().indexOf(q) < 0 && String(n.node_id).toLowerCase().indexOf(q) < 0)) return false;
      return true;
    }).map(function (n) {
      const k = n.kind || "screen";
      const base = KIND_COLORS[k] || KIND_COLORS.screen;
      const hb = harmonyBorder(n);
      return {
        id: n.node_id,
        label: n.label || n.node_id,
        group: k,
        shape: KIND_SHAPES[k] || "box",
        color: { background: base.bg, border: hb.color, highlight: { border: "#fff", background: base.bg } },
        borderWidth: hb.width,
        title: n.node_id,
        _raw: n,
      };
    });
  }

  function buildVisEdges(rawEdges, nodeIds, relOn) {
    const set = new Set(nodeIds);
    return rawEdges.filter(function (e) {
      if (!relOn[e.rel]) return false;
      return set.has(e.from) && set.has(e.to);
    }).map(function (e, i) {
      return {
        id: e.edge_id || ("edge:" + i),
        from: e.from,
        to: e.to,
        arrows: "to",
        dashes: e.rel === "presents_modal",
        color: e.rel === "presents_modal" ? { color: "#8899aa", highlight: "#ccd" } : { color: "#aab", highlight: "#fff" },
        title: [e.rel, e.via, e.trigger, e.source, e.line ? ("line:" + e.line) : "", e.callsite_file ? (e.callsite_file + ":" + e.callsite_line) : ""].filter(Boolean).join("\n"),
      };
    });
  }

  function lineEvidence(node) {
    const ev = (node && node.evidence) || {};
    const file = ev.source_file || ev.file;
    const line = ev.line === undefined || ev.line === null || ev.line === "" ? ev.start_line : ev.line;
    if (!file || line === undefined || line === null || line === "") return null;
    return {
      file: String(file),
      line: line,
      kind: ev.effect_kind || ev.kind || ev.bucket || ev.function_name || "",
      path: ev.path_display_report || ev.path_display_legacy || "",
    };
  }

  function connectedLineEvidence(nodeId, rawNodes, rawEdges) {
    const nodeById = {};
    rawNodes.forEach(function (n) { nodeById[n.node_id] = n; });
    const seen = new Set([nodeId]);
    const queue = rawEdges.filter(function (e) { return e.from === nodeId; }).map(function (e) { return e.to; });
    const out = [];
    while (queue.length && out.length < 25) {
      const id = queue.shift();
      if (seen.has(id)) continue;
      seen.add(id);
      const n = nodeById[id];
      const ev = lineEvidence(n);
      if (ev) out.push(ev);
      rawEdges.forEach(function (e) {
        if (e.from === id && !seen.has(e.to)) queue.push(e.to);
      });
    }
    return out;
  }

  function renderDetail(node, rawNodes, rawEdges) {
    const detail = document.getElementById("detail");
    const anchors = node.kind === "feature" ? connectedLineEvidence(node.node_id, rawNodes, rawEdges) : [lineEvidence(node)].filter(Boolean);
    let summary = "";
    if (anchors.length) {
      summary += "Source anchors:\n";
      anchors.forEach(function (a) {
        summary += "- " + a.file + ":" + a.line;
        if (a.kind) summary += " [" + a.kind + "]";
        if (a.path) summary += "\n  " + a.path;
        summary += "\n";
      });
      summary += "\n";
    }
    detail.textContent = summary + JSON.stringify(node, null, 2);
  }

  function neighborsOf(selId, rawEdges) {
    const s = new Set([selId]);
    rawEdges.forEach(function (e) {
      if (e.from === selId) s.add(e.to);
      if (e.to === selId) s.add(e.from);
    });
    return s;
  }

  Promise.all([
    fetch("feature_tree.v1.json").then(function (r) { if (!r.ok) throw new Error("feature_tree.v1.json"); return r.json(); }),
    fetch("framework_map_sidecar.json").then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
  ]).then(function (_ref) {
    const tree = _ref[0];
    const side = _ref[1];
    document.getElementById("counts").textContent =
      "nodes=" + (tree.nodes || []).length + " edges=" + (tree.edges || []).length + " template=" + VIEWER_TEMPLATE_VERSION;
    if (side && side.rules_version) {
      document.getElementById("rulesVer").textContent = "rules_version=" + side.rules_version;
    }

    const rawNodes = tree.nodes || [];
    const rawEdges = tree.edges || [];
    const kinds = Array.from(new Set(rawNodes.map(function (n) { return n.kind; }))).sort();
    const rels = Array.from(new Set(rawEdges.map(function (e) { return e.rel; }))).sort();

    const kindOn = {};
    kinds.forEach(function (k) { kindOn[k] = true; });
    const relOn = {};
    rels.forEach(function (r) { relOn[r] = true; });

    function renderFilters() {
      const kf = document.getElementById("kindFilters");
      const rf = document.getElementById("relFilters");
      kf.innerHTML = "";
      rf.innerHTML = "";
      kinds.forEach(function (k) {
        const id = "k_" + k;
        const lab = document.createElement("label");
        lab.innerHTML = '<input type="checkbox" id="' + id + '" data-kind="' + k + '" checked /> ' + k;
        kf.appendChild(lab);
      });
      rels.forEach(function (r) {
        const id = "r_" + r;
        const lab = document.createElement("label");
        lab.innerHTML = '<input type="checkbox" id="' + id + '" data-rel="' + r + '" checked /> ' + r;
        rf.appendChild(lab);
      });
      kf.querySelectorAll("input").forEach(function (inp) {
        inp.addEventListener("change", function () { kindOn[inp.dataset.kind] = inp.checked; redraw(); });
      });
      rf.querySelectorAll("input").forEach(function (inp) {
        inp.addEventListener("change", function () { relOn[inp.dataset.rel] = inp.checked; redraw(); });
      });
    }

    let network = null;
    let selId = null;

    function redraw() {
      const onlyFs = document.getElementById("onlyFs").checked;
      const hideImpl = document.getElementById("hideImpl").checked;
      const focus = document.getElementById("focus1hop").checked;
      const searchQ = document.getElementById("search").value;
      let nodes = buildVisNodes(rawNodes, kindOn, relOn, onlyFs, hideImpl, searchQ);
      let edges = rawEdges;
      let allow = new Set(nodes.map(function (n) { return n.id; }));
      if (focus && selId && allow.has(selId)) {
        const hop = neighborsOf(selId, rawEdges);
        nodes = nodes.filter(function (n) { return hop.has(n.id); });
        allow = new Set(nodes.map(function (n) { return n.id; }));
      }
      edges = buildVisEdges(rawEdges, Array.from(allow), relOn);
      const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
      const layout = document.getElementById("layoutSel").value;
      const opts = {
        physics: layout === "force",
        layout: layout === "hier" ? { hierarchical: { direction: "UD", sortMethod: "directed" } } : undefined,
        interaction: { hover: true, multiselect: false },
        nodes: { font: { color: "#eee", size: 13 } },
        edges: { font: { align: "middle", color: "#889", size: 10 }, smooth: { type: "cubicBezier" } },
      };
      const el = document.getElementById("net");
      if (network) network.destroy();
      network = new vis.Network(el, data, opts);
      if (layout === "hier") {
        network.once("stabilizationIterationsDone", function () { network.setOptions({ physics: false }); });
      }
      network.on("click", function (p) {
        if (p.nodes && p.nodes.length) {
          selId = p.nodes[0];
          const x = data.nodes.get(selId);
          document.getElementById("pickHint").textContent = selId;
          renderDetail(x._raw, rawNodes, rawEdges);
          if (document.getElementById("focus1hop").checked) redraw();
        }
      });
    }

    renderFilters();
    if (rawNodes.length > LARGE_THRESHOLD) {
      document.getElementById("onlyFs").checked = true;
      toast("节点数 > " + LARGE_THRESHOLD + "，已默认开启「仅 feature + screen」");
    }
    ["onlyFs", "hideImpl", "focus1hop", "layoutSel"].forEach(function (id) {
      document.getElementById(id).addEventListener("change", redraw);
    });
    document.getElementById("search").addEventListener("input", function () { redraw(); });
    document.getElementById("resetView").addEventListener("click", function () { selId = null; redraw(); network && network.fit(); });
    redraw();
  }).catch(function (err) {
    document.getElementById("counts").textContent = "加载失败: " + err;
    console.error(err);
  });
})();
  </script>
</body>
</html>
