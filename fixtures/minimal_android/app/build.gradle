plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.verifyfix.minimal'
    compileSdk 34
    defaultConfig {
        applicationId "com.verifyfix.minimal"
        minSdk 24
        targetSdk 34
    }
    sourceSets {
        main.java.srcDirs += 'src/main/java'
    }
}
